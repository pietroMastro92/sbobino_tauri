name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg,app
            artifact_name: macos-arm64
            notarize: true
          - os: macos-13
            target: x86_64-apple-darwin
            bundles: dmg,app
            artifact_name: macos-intel
            notarize: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
            artifact_name: windows-x64
            notarize: false
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
            artifact_name: linux-x64
            notarize: false

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: sbobino_desktop/apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sbobino_desktop/apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sbobino_desktop -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm run tauri:build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Notarize and staple macOS DMG
        if: ${{ matrix.notarize && secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          shopt -s nullglob
          for dmg in src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg; do
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbobino-${{ matrix.artifact_name }}
          path: |
            sbobino_desktop/apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
