name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: sbobino_desktop/apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sbobino_desktop/apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sbobino_desktop -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Install macOS runtime packaging dependencies
        run: brew install whisper-cpp ffmpeg sdl2

      - name: Prepare pyannote setup assets
        run: ../../scripts/setup_bundled_pyannote.sh --force

      - name: Inject updater public key
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: ../../scripts/prepare_release_updater_config.sh src-tauri/tauri.conf.json "$TAURI_UPDATER_PUBLIC_KEY"

      - name: Build bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE" || -z "$APPLE_CERTIFICATE_PASSWORD" || -z "$APPLE_SIGNING_IDENTITY" ]]; then
            echo "Apple signing secrets are not configured; building unsigned macOS bundles."
            unset APPLE_CERTIFICATE
            unset APPLE_CERTIFICATE_PASSWORD
            unset APPLE_SIGNING_IDENTITY
          fi
          npm run tauri:build -- --target aarch64-apple-darwin --bundles app

      - name: Re-sign bundled app and updater artifact
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          APP_DIR=../../target/aarch64-apple-darwin/release/bundle/macos
          APP_NAME="Sbobino.app"
          APP_PATH="$APP_DIR/$APP_NAME"
          UPDATER_TAR="$APP_DIR/Sbobino.app.tar.gz"
          UPDATER_SIG="$UPDATER_TAR.sig"

          codesign --force --deep --sign - "$APP_PATH"
          rm -f "$UPDATER_TAR" "$UPDATER_SIG"
          tar -czf "$UPDATER_TAR" -C "$APP_DIR" "$APP_NAME"
          npx tauri signer sign "$UPDATER_TAR"

      - name: Create standalone macOS DMG
        run: |
          APP_DIR=../../target/aarch64-apple-darwin/release/bundle/macos
          DMG_DIR=../../target/aarch64-apple-darwin/release/bundle/dmg
          APP_NAME="Sbobino.app"
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="Sbobino_${VERSION}_aarch64.dmg"
          STAGING_DIR=$(mktemp -d)

          mkdir -p "$DMG_DIR"
          cp -R "$APP_DIR/$APP_NAME" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"

          hdiutil create \
            -volname "Sbobino" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$DMG_DIR/$DMG_NAME"

      - name: Package pyannote repair assets
        run: |
          ASSET_DIR=../../target/aarch64-apple-darwin/release/bundle/pyannote-release
          mkdir -p "$ASSET_DIR"
          ../../scripts/package_pyannote_asset.sh \
            src-tauri/resources/pyannote/python/aarch64-apple-darwin \
            python \
            "$ASSET_DIR/pyannote-runtime-macos-aarch64.zip"
          ../../scripts/package_pyannote_asset.sh \
            src-tauri/resources/pyannote/model \
            model \
            "$ASSET_DIR/pyannote-model-community-1.zip"
          RUNTIME_SHA=$(shasum -a 256 "$ASSET_DIR/pyannote-runtime-macos-aarch64.zip" | awk '{print $1}')
          MODEL_SHA=$(shasum -a 256 "$ASSET_DIR/pyannote-model-community-1.zip" | awk '{print $1}')
          cat >"$ASSET_DIR/pyannote-manifest.json" <<JSON
          {
            "app_version": "${GITHUB_REF_NAME#v}",
            "assets": [
              {
                "kind": "pyannote_runtime_macos_aarch64",
                "name": "pyannote-runtime-macos-aarch64.zip",
                "sha256": "$RUNTIME_SHA"
              },
              {
                "kind": "pyannote_model",
                "name": "pyannote-model-community-1.zip",
                "sha256": "$MODEL_SHA"
              }
            ]
          }
          JSON

      - name: Package local runtime setup assets
        run: |
          ASSET_DIR=../../target/aarch64-apple-darwin/release/bundle/runtime-release
          mkdir -p "$ASSET_DIR"
          ../../scripts/package_macos_runtime_asset.sh "$ASSET_DIR/speech-runtime-macos-aarch64.zip"
          RUNTIME_SHA=$(shasum -a 256 "$ASSET_DIR/speech-runtime-macos-aarch64.zip" | awk '{print $1}')
          cat >"$ASSET_DIR/runtime-manifest.json" <<JSON
          {
            "app_version": "${GITHUB_REF_NAME#v}",
            "assets": [
              {
                "kind": "speech_runtime_macos_aarch64",
                "name": "speech-runtime-macos-aarch64.zip",
                "sha256": "$RUNTIME_SHA"
              }
            ]
          }
          JSON

      - name: Notarize and staple macOS DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APPLE_PASSWORD" || -z "$APPLE_TEAM_ID" ]]; then
            echo "Apple notarization secrets are not configured; skipping notarization."
            exit 0
          fi
          shopt -s nullglob
          for dmg in ../../target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbobino-macos-arm64
          path: |
            sbobino_desktop/target/aarch64-apple-darwin/release/bundle/**

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Normalize release asset names
        run: |
          if [[ -f "dist/macos/Sbobino.app.tar.gz" ]]; then
            mv "dist/macos/Sbobino.app.tar.gz" "dist/macos/Sbobino.app.tar.gz"
          fi
          if [[ -f "dist/macos/Sbobino.app.tar.gz.sig" ]]; then
            mv "dist/macos/Sbobino.app.tar.gz.sig" "dist/macos/Sbobino.app.tar.gz.sig"
          fi
          if [[ -f "dist/dmg/Sbobino_${GITHUB_REF_NAME#v}_aarch64.dmg" ]]; then
            mv "dist/dmg/Sbobino_${GITHUB_REF_NAME#v}_aarch64.dmg" "dist/dmg/Sbobino_${GITHUB_REF_NAME#v}_aarch64.dmg"
          fi

      - name: Prepare release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > release-notes.md <<EOF
          ## Sbobino ${VERSION}

          Sbobino is the first public standalone release for macOS Apple Silicon.

          ### What is included

          - Native desktop app for macOS Apple Silicon.
          - Guided first-launch setup for the local transcription runtime.
          - Automatic first-launch installation of FFmpeg, Whisper CLI, and Whisper Stream.
          - Automatic first-launch download of the required Whisper models.
          - Automatic first-launch installation of the pyannote diarization runtime and model when speaker diarization is enabled.
          - In-app update support for future releases.

          ### Download and installation

          - Download the \`.dmg\` file for the recommended macOS installation flow.
          - Open the disk image and drag **Sbobino** into the **Applications** folder.
          - On first launch, accept the privacy terms and let the app complete the guided local runtime setup.

          ### Important notes

          - This release is intended for macOS Apple Silicon.
          - Apple notarization is applied only when Apple release credentials are configured in CI.
          - The DMG stays lighter because the local runtime toolchain, Whisper models, and pyannote diarization assets are installed during setup instead of being bundled inside the app.
          EOF

      - name: Generate updater feed
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SIGNATURE=$(tr -d '\n' < "dist/macos/Sbobino.app.tar.gz.sig")
          NOTES=$(cat release-notes.md)
          URL="https://github.com/pietroMastro92/sbobino_tauri/releases/download/v${VERSION}/Sbobino.app.tar.gz"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg url "$URL" \
            --arg signature "$SIGNATURE" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  url: $url,
                  signature: $signature
                }
              }
            }' > latest.json

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          body_path: release-notes.md
          generate_release_notes: false
          files: |
            dist/dmg/Sbobino_*.dmg
            dist/macos/Sbobino.app.tar.gz
            dist/macos/Sbobino.app.tar.gz.sig
            dist/pyannote-release/*.zip
            dist/pyannote-release/*.json
            dist/runtime-release/*.zip
            dist/runtime-release/*.json
            latest.json
