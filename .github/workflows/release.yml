name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing git tag to build and publish as a prerelease candidate
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-readiness:
    runs-on: macos-14
    env:
      TAG_NAME: ${{ inputs.tag_name }}
    defaults:
      run:
        working-directory: sbobino_desktop/apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sbobino_desktop/apps/desktop/package-lock.json

      - name: Check version coherence before packaging
        run: |
          VERSION="${TAG_NAME#v}"
          ../../scripts/check_release_versions.sh "$VERSION"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sbobino_desktop -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Install macOS runtime packaging dependencies
        run: brew install whisper-cpp ffmpeg sdl2

      - name: Prepare pyannote setup assets
        run: ../../scripts/setup_bundled_pyannote.sh --force

      - name: Inject updater public key
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: ../../scripts/prepare_release_updater_config.sh src-tauri/tauri.conf.json "$TAURI_UPDATER_PUBLIC_KEY"

      - name: Build bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE" || -z "$APPLE_CERTIFICATE_PASSWORD" || -z "$APPLE_SIGNING_IDENTITY" ]]; then
            echo "Apple signing secrets are not configured; building unsigned macOS bundles."
            unset APPLE_CERTIFICATE
            unset APPLE_CERTIFICATE_PASSWORD
            unset APPLE_SIGNING_IDENTITY
          fi
          npm run tauri:build -- --target aarch64-apple-darwin --bundles app

      - name: Re-sign bundled app and updater artifact
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          APP_DIR=../../target/aarch64-apple-darwin/release/bundle/macos
          APP_NAME="Sbobino.app"
          APP_PATH="$APP_DIR/$APP_NAME"
          UPDATER_TAR="$APP_DIR/Sbobino.app.tar.gz"
          UPDATER_SIG="$UPDATER_TAR.sig"

          codesign --force --deep --sign - "$APP_PATH"
          rm -f "$UPDATER_TAR" "$UPDATER_SIG"
          COPYFILE_DISABLE=1 tar -czf "$UPDATER_TAR" -C "$APP_DIR" "$APP_NAME"
          npx tauri signer sign "$UPDATER_TAR"

      - name: Create standalone macOS DMG
        run: |
          APP_DIR=../../target/aarch64-apple-darwin/release/bundle/macos
          DMG_DIR=../../target/aarch64-apple-darwin/release/bundle/dmg
          APP_NAME="Sbobino.app"
          VERSION="${TAG_NAME#v}"
          DMG_NAME="Sbobino_${VERSION}_aarch64.dmg"
          STAGING_DIR=$(mktemp -d)

          mkdir -p "$DMG_DIR"
          cp -R "$APP_DIR/$APP_NAME" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"

          hdiutil create \
            -volname "Sbobino" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$DMG_DIR/$DMG_NAME"

      - name: Run release readiness gate
        run: |
          VERSION="${TAG_NAME#v}"
          APP_PATH=../../target/aarch64-apple-darwin/release/bundle/macos/Sbobino.app
          chmod +x ../../scripts/check_release_versions.sh ../../scripts/release_readiness.sh
          ../../scripts/release_readiness.sh "$VERSION" "$APP_PATH"

      - name: Package pyannote repair assets
        run: |
          ASSET_DIR=../../target/aarch64-apple-darwin/release/bundle/pyannote-release
          mkdir -p "$ASSET_DIR"
          ../../scripts/package_pyannote_asset.sh \
            src-tauri/resources/pyannote/python/aarch64-apple-darwin \
            python \
            "$ASSET_DIR/pyannote-runtime-macos-aarch64.zip"
          ../../scripts/package_pyannote_asset.sh \
            src-tauri/resources/pyannote/model \
            model \
            "$ASSET_DIR/pyannote-model-community-1.zip"

      - name: Package local runtime setup assets
        run: |
          ASSET_DIR=../../target/aarch64-apple-darwin/release/bundle/runtime-release
          mkdir -p "$ASSET_DIR"
          ../../scripts/package_macos_runtime_asset.sh "$ASSET_DIR/speech-runtime-macos-aarch64.zip"

      - name: Generate release setup manifests
        run: |
          RELEASE_ASSET_DIR=../../target/aarch64-apple-darwin/release/bundle/release-assets
          PYANNOTE_DIR=../../target/aarch64-apple-darwin/release/bundle/pyannote-release
          RUNTIME_DIR=../../target/aarch64-apple-darwin/release/bundle/runtime-release
          mkdir -p "$RELEASE_ASSET_DIR"
          cp "$PYANNOTE_DIR/pyannote-runtime-macos-aarch64.zip" "$RELEASE_ASSET_DIR/"
          cp "$PYANNOTE_DIR/pyannote-model-community-1.zip" "$RELEASE_ASSET_DIR/"
          cp "$RUNTIME_DIR/speech-runtime-macos-aarch64.zip" "$RELEASE_ASSET_DIR/"
          ../../scripts/generate_release_manifests.sh "${TAG_NAME#v}" "$RELEASE_ASSET_DIR"
          cp "$RELEASE_ASSET_DIR/pyannote-manifest.json" "$PYANNOTE_DIR/"
          cp "$RELEASE_ASSET_DIR/runtime-manifest.json" "$RUNTIME_DIR/"

      - name: Notarize and staple macOS DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APPLE_PASSWORD" || -z "$APPLE_TEAM_ID" ]]; then
            echo "Apple notarization secrets are not configured; skipping notarization."
            exit 0
          fi
          shopt -s nullglob
          for dmg in ../../target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbobino-macos-arm64
          path: |
            sbobino_desktop/target/aarch64-apple-darwin/release/bundle/**

  publish-candidate:
    needs: release-readiness
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ inputs.tag_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: sbobino-macos-arm64
          path: dist

      - name: Assemble candidate release directory
        working-directory: sbobino_desktop
        run: |
          VERSION="${TAG_NAME#v}"
          ASSET_DIR="$PWD/dist/github-release/v$VERSION"
          mkdir -p "$ASSET_DIR"

          cp "../dist/dmg/Sbobino_${VERSION}_aarch64.dmg" "$ASSET_DIR/"
          cp "../dist/macos/Sbobino.app.tar.gz" "$ASSET_DIR/"
          cp "../dist/macos/Sbobino.app.tar.gz.sig" "$ASSET_DIR/"
          cp "../dist/release-assets/setup-manifest.json" "$ASSET_DIR/"
          cp "../dist/runtime-release/speech-runtime-macos-aarch64.zip" "$ASSET_DIR/"
          cp "../dist/runtime-release/runtime-manifest.json" "$ASSET_DIR/"
          cp "../dist/pyannote-release/pyannote-runtime-macos-aarch64.zip" "$ASSET_DIR/"
          cp "../dist/pyannote-release/pyannote-model-community-1.zip" "$ASSET_DIR/"
          cp "../dist/pyannote-release/pyannote-manifest.json" "$ASSET_DIR/"

      - name: Generate release notes
        working-directory: sbobino_desktop
        run: |
          VERSION="${TAG_NAME#v}"
          cat > "dist/github-release/v$VERSION/release-notes.md" <<EOF
          ## Sbobino ${VERSION}

          Candidate release built from the exact tagged sources for public distribution validation.

          ### What is included

          - Native desktop app for macOS Apple Silicon.
          - Managed offline runtime setup for speech transcription and pyannote diarization.
          - Release manifests and updater metadata tied to this exact candidate.
          - Fail-closed promotion path: stable is blocked until hosted and self-hosted validation reports are uploaded as passed.

          ### Validation contract

          - This release is published first as a prerelease candidate.
          - Stable promotion requires \`release_readiness.sh\`, \`distribution_readiness.sh\`, \`AS-PRIMARY\`, \`AS-THIRD\`, and \`INTEL-PRIMARY\` evidence on the exact public assets.
          - If any mandatory validation fails, retire this candidate and cut a new patch version instead of overwriting the stable release.
          EOF

      - name: Generate updater feed
        working-directory: sbobino_desktop
        run: |
          VERSION="${TAG_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SIGNATURE=$(tr -d '\n' < "dist/github-release/v$VERSION/Sbobino.app.tar.gz.sig")
          NOTES=$(cat "dist/github-release/v$VERSION/release-notes.md")
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/Sbobino.app.tar.gz"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg url "$URL" \
            --arg signature "$SIGNATURE" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  url: $url,
                  signature: $signature
                }
              }
            }' > "dist/github-release/v$VERSION/latest.json"

      - name: Generate release candidate metadata
        working-directory: sbobino_desktop
        run: |
          VERSION="${TAG_NAME#v}"
          python3 ./scripts/generate_release_candidate_metadata.py \
            "$PWD/dist/github-release/v$VERSION" \
            "$VERSION" \
            --release-profile public \
            --commit-sha "$(git rev-parse HEAD)"

      - name: Publish prerelease candidate
        working-directory: sbobino_desktop
        run: |
          VERSION="${TAG_NAME#v}"
          ./scripts/publish_candidate_release.sh "$VERSION" "$GITHUB_REPOSITORY" "$PWD/dist/github-release/v$VERSION"

  distribution-readiness:
    # macos-14 is required: distribution_readiness.sh extracts the pyannote
    # runtime zip and runs its bundled aarch64 python3 to smoke-test imports.
    # ubuntu cannot exec the Mach-O binary.
    needs: publish-candidate
    runs-on: macos-14
    env:
      TAG_NAME: ${{ inputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}
          fetch-depth: 0

      - name: Run distribution readiness
        working-directory: sbobino_desktop
        run: |
          VERSION="${TAG_NAME#v}"
          ./scripts/distribution_readiness.sh "$VERSION" "$GITHUB_REPOSITORY"

      - name: Write distribution readiness proof
        working-directory: sbobino_desktop
        run: |
          VERSION="${TAG_NAME#v}"
          python3 ./scripts/write_distribution_readiness_proof.py \
            "$PWD/distribution-readiness-proof.json" \
            "$VERSION" \
            --repo-slug "$GITHUB_REPOSITORY" \
            --commit-sha "$(git rev-parse HEAD)"

      - name: Upload distribution readiness artifact
        uses: actions/upload-artifact@v4
        with:
          name: distribution-readiness-proof
          path: sbobino_desktop/distribution-readiness-proof.json

  portability-smoke:
    # Clean-room third-party Mac simulation on a hosted macos-14 VM. A fresh VM
    # means no Homebrew, no dev env, no login keychain residue — so a DMG that
    # installs and launches here will install and launch on any third-party
    # Apple Silicon Mac that accepts Gatekeeper. A dedicated login keychain is
    # created so the app's secure_storage can write `master_key_v1` without an
    # interactive prompt.
    needs: publish-candidate
    runs-on: macos-14
    env:
      TAG_NAME: ${{ inputs.tag_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}
          fetch-depth: 0

      - name: Bootstrap headless login keychain
        run: |
          # Hosted macos-14 runners start with no unlocked login keychain.
          # Without one, `security add-generic-password` (used by the app's
          # secure storage) raises an interactive prompt that headless CI
          # cannot answer. Create and unlock an empty keychain up-front.
          KC="$HOME/Library/Keychains/login.keychain-db"
          if [[ ! -f "$KC" ]]; then
            security create-keychain -p "" "$KC"
          fi
          security default-keychain -s "$KC"
          security unlock-keychain -p "" "$KC"
          security set-keychain-settings "$KC"

      - name: Download candidate DMG
        working-directory: sbobino_desktop
        run: |
          VERSION="${TAG_NAME#v}"
          mkdir -p dist/portability
          gh release download "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "Sbobino_${VERSION}_aarch64.dmg" \
            --dir dist/portability

      - name: Install app from DMG
        working-directory: sbobino_desktop
        run: |
          VERSION="${TAG_NAME#v}"
          DMG="dist/portability/Sbobino_${VERSION}_aarch64.dmg"
          MNT=$(mktemp -d)
          hdiutil attach "$DMG" -nobrowse -quiet -mountpoint "$MNT"
          sudo rm -rf /Applications/Sbobino.app
          /usr/bin/ditto "$MNT/Sbobino.app" /Applications/Sbobino.app
          hdiutil detach "$MNT" -quiet
          xattr -dr com.apple.quarantine /Applications/Sbobino.app || true

      - name: Launch app and confirm it stays alive
        working-directory: sbobino_desktop
        run: |
          /Applications/Sbobino.app/Contents/MacOS/sbobino-desktop >launch.log 2>&1 &
          APP_PID=$!
          echo "launched PID=$APP_PID"
          sleep 15
          if kill -0 "$APP_PID" 2>/dev/null; then
            echo "App alive after 15s — portability smoke passed."
            kill "$APP_PID" || true
            wait "$APP_PID" 2>/dev/null || true
            exit 0
          fi
          wait "$APP_PID" 2>/dev/null
          EXIT=$?
          echo "App exited prematurely with status $EXIT" >&2
          echo "---launch.log---" >&2
          tail -80 launch.log >&2 || true
          exit 1

      - name: Write portability smoke report
        if: always()
        working-directory: sbobino_desktop
        run: |
          VERSION="${TAG_NAME#v}"
          STATUS="passed"
          if [[ "${{ job.status }}" != "success" ]]; then
            STATUS="failed"
          fi
          cat > portability-smoke-report.json <<EOF
          {
            "schema_version": 1,
            "version": "${VERSION}",
            "release_tag": "${TAG_NAME}",
            "status": "${STATUS}",
            "runner": "github-hosted macos-14",
            "machine_class": "HOSTED-CLEANROOM",
            "tested_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commit_sha": "$(git rev-parse HEAD)"
          }
          EOF

      - name: Upload portability smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portability-smoke-report
          path: sbobino_desktop/portability-smoke-report.json

  upload-validation-assets:
    needs:
      - publish-candidate
      - distribution-readiness
      - portability-smoke
    if: always()
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ inputs.tag_name }}
      GH_TOKEN: ${{ github.token }}
      DISTRIBUTION_RESULT: ${{ needs.distribution-readiness.result }}
      PORTABILITY_RESULT: ${{ needs.portability-smoke.result }}
    steps:
      - name: Download distribution readiness proof
        uses: actions/download-artifact@v4
        with:
          name: distribution-readiness-proof
          path: validation-assets

      - name: Download portability smoke report
        uses: actions/download-artifact@v4
        with:
          name: portability-smoke-report
          path: validation-assets

      - name: Upload validation assets to prerelease
        run: |
          gh release upload "$TAG_NAME" \
            validation-assets/distribution-readiness-proof.json \
            validation-assets/portability-smoke-report.json \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Fail workflow if mandatory validation failed
        run: |
          echo "distribution-readiness: $DISTRIBUTION_RESULT"
          echo "portability-smoke: $PORTABILITY_RESULT"
          if [[ "$DISTRIBUTION_RESULT" != "success" || "$PORTABILITY_RESULT" != "success" ]]; then
            echo "Release candidate validation did not fully pass." >&2
            exit 1
          fi
