name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: sbobino_desktop/apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sbobino_desktop/apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sbobino_desktop -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare bundled pyannote runtime
        run: ../../scripts/setup_bundled_pyannote.sh --force

      - name: Inject updater public key
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: ../../scripts/prepare_release_updater_config.sh src-tauri/tauri.conf.json "$TAURI_UPDATER_PUBLIC_KEY"

      - name: Build bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE" || -z "$APPLE_CERTIFICATE_PASSWORD" || -z "$APPLE_SIGNING_IDENTITY" ]]; then
            echo "Apple signing secrets are not configured; building unsigned macOS bundles."
            unset APPLE_CERTIFICATE
            unset APPLE_CERTIFICATE_PASSWORD
            unset APPLE_SIGNING_IDENTITY
          fi
          npm run tauri:build -- --target aarch64-apple-darwin --bundles dmg,app

      - name: Package pyannote repair assets
        run: |
          ASSET_DIR=src-tauri/target/aarch64-apple-darwin/release/bundle/pyannote-release
          mkdir -p "$ASSET_DIR"
          ../../scripts/package_pyannote_asset.sh \
            src-tauri/resources/pyannote/python/aarch64-apple-darwin \
            python \
            "$ASSET_DIR/pyannote-runtime-macos-aarch64.zip"
          ../../scripts/package_pyannote_asset.sh \
            src-tauri/resources/pyannote/model \
            model \
            "$ASSET_DIR/pyannote-model-community-1.zip"
          RUNTIME_SHA=$(shasum -a 256 "$ASSET_DIR/pyannote-runtime-macos-aarch64.zip" | awk '{print $1}')
          MODEL_SHA=$(shasum -a 256 "$ASSET_DIR/pyannote-model-community-1.zip" | awk '{print $1}')
          cat >"$ASSET_DIR/pyannote-manifest.json" <<JSON
          {
            "app_version": "${GITHUB_REF_NAME#v}",
            "assets": [
              {
                "kind": "pyannote_runtime_macos_aarch64",
                "name": "pyannote-runtime-macos-aarch64.zip",
                "sha256": "$RUNTIME_SHA"
              },
              {
                "kind": "pyannote_model",
                "name": "pyannote-model-community-1.zip",
                "sha256": "$MODEL_SHA"
              }
            ]
          }
          JSON

      - name: Notarize and staple macOS DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APPLE_PASSWORD" || -z "$APPLE_TEAM_ID" ]]; then
            echo "Apple notarization secrets are not configured; skipping notarization."
            exit 0
          fi
          shopt -s nullglob
          for dmg in src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbobino-macos-arm64
          path: |
            sbobino_desktop/apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/**

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
