name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing git tag to build and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-readiness:
    runs-on: macos-14
    env:
      TAG_NAME: ${{ inputs.tag_name }}
    defaults:
      run:
        working-directory: sbobino_desktop/apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sbobino_desktop/apps/desktop/package-lock.json

      - name: Check version coherence before packaging
        run: |
          VERSION="${TAG_NAME#v}"
          ../../scripts/check_release_versions.sh "$VERSION"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sbobino_desktop -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Install macOS runtime packaging dependencies
        run: brew install whisper-cpp ffmpeg sdl2

      - name: Prepare pyannote setup assets
        run: ../../scripts/setup_bundled_pyannote.sh --force

      - name: Inject updater public key
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: ../../scripts/prepare_release_updater_config.sh src-tauri/tauri.conf.json "$TAURI_UPDATER_PUBLIC_KEY"

      - name: Build bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE" || -z "$APPLE_CERTIFICATE_PASSWORD" || -z "$APPLE_SIGNING_IDENTITY" ]]; then
            echo "Apple signing secrets are not configured; building unsigned macOS bundles."
            unset APPLE_CERTIFICATE
            unset APPLE_CERTIFICATE_PASSWORD
            unset APPLE_SIGNING_IDENTITY
          fi
          npm run tauri:build -- --target aarch64-apple-darwin --bundles app

      - name: Re-sign bundled app and updater artifact
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          APP_DIR=../../target/aarch64-apple-darwin/release/bundle/macos
          APP_NAME="Sbobino.app"
          APP_PATH="$APP_DIR/$APP_NAME"
          UPDATER_TAR="$APP_DIR/Sbobino.app.tar.gz"
          UPDATER_SIG="$UPDATER_TAR.sig"

          codesign --force --deep --sign - "$APP_PATH"
          rm -f "$UPDATER_TAR" "$UPDATER_SIG"
          COPYFILE_DISABLE=1 tar -czf "$UPDATER_TAR" -C "$APP_DIR" "$APP_NAME"
          npx tauri signer sign "$UPDATER_TAR"

      - name: Create standalone macOS DMG
        run: |
          APP_DIR=../../target/aarch64-apple-darwin/release/bundle/macos
          DMG_DIR=../../target/aarch64-apple-darwin/release/bundle/dmg
          APP_NAME="Sbobino.app"
          VERSION="${TAG_NAME#v}"
          DMG_NAME="Sbobino_${VERSION}_aarch64.dmg"
          STAGING_DIR=$(mktemp -d)

          mkdir -p "$DMG_DIR"
          cp -R "$APP_DIR/$APP_NAME" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"

          hdiutil create \
            -volname "Sbobino" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$DMG_DIR/$DMG_NAME"

      - name: Run release readiness gate
        run: |
          VERSION="${TAG_NAME#v}"
          APP_PATH=../../target/aarch64-apple-darwin/release/bundle/macos/Sbobino.app
          chmod +x ../../scripts/check_release_versions.sh ../../scripts/release_readiness.sh
          ../../scripts/release_readiness.sh "$VERSION" "$APP_PATH"

      - name: Package pyannote repair assets
        run: |
          ASSET_DIR=../../target/aarch64-apple-darwin/release/bundle/pyannote-release
          mkdir -p "$ASSET_DIR"
          ../../scripts/package_pyannote_asset.sh \
            src-tauri/resources/pyannote/python/aarch64-apple-darwin \
            python \
            "$ASSET_DIR/pyannote-runtime-macos-aarch64.zip"
          ../../scripts/package_pyannote_asset.sh \
            src-tauri/resources/pyannote/model \
            model \
            "$ASSET_DIR/pyannote-model-community-1.zip"

      - name: Package local runtime setup assets
        run: |
          ASSET_DIR=../../target/aarch64-apple-darwin/release/bundle/runtime-release
          mkdir -p "$ASSET_DIR"
          ../../scripts/package_macos_runtime_asset.sh "$ASSET_DIR/speech-runtime-macos-aarch64.zip"

      - name: Generate release setup manifests
        run: |
          RELEASE_ASSET_DIR=../../target/aarch64-apple-darwin/release/bundle/release-assets
          PYANNOTE_DIR=../../target/aarch64-apple-darwin/release/bundle/pyannote-release
          RUNTIME_DIR=../../target/aarch64-apple-darwin/release/bundle/runtime-release
          mkdir -p "$RELEASE_ASSET_DIR"
          cp "$PYANNOTE_DIR/pyannote-runtime-macos-aarch64.zip" "$RELEASE_ASSET_DIR/"
          cp "$PYANNOTE_DIR/pyannote-model-community-1.zip" "$RELEASE_ASSET_DIR/"
          cp "$RUNTIME_DIR/speech-runtime-macos-aarch64.zip" "$RELEASE_ASSET_DIR/"
          ../../scripts/generate_release_manifests.sh "${TAG_NAME#v}" "$RELEASE_ASSET_DIR"
          cp "$RELEASE_ASSET_DIR/pyannote-manifest.json" "$PYANNOTE_DIR/"
          cp "$RELEASE_ASSET_DIR/runtime-manifest.json" "$RUNTIME_DIR/"

      - name: Notarize and staple macOS DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APPLE_PASSWORD" || -z "$APPLE_TEAM_ID" ]]; then
            echo "Apple notarization secrets are not configured; skipping notarization."
            exit 0
          fi
          shopt -s nullglob
          for dmg in ../../target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbobino-macos-arm64
          path: |
            sbobino_desktop/target/aarch64-apple-darwin/release/bundle/**

  publish:
    needs: release-readiness
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ inputs.tag_name }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release notes
        run: |
          VERSION="${TAG_NAME#v}"
          cat > release-notes.md <<EOF
          ## Sbobino ${VERSION}

          Sbobino ${VERSION} is the corrective macOS Apple Silicon release that supersedes the broken first-launch setup shipped in v0.1.5.

          ### What is included

          - Native desktop app for macOS Apple Silicon.
          - Fix for the first-launch pyannote setup version mismatch that blocked v0.1.5.
          - Guided first-launch setup for the local transcription runtime.
          - Automatic first-launch installation of FFmpeg, Whisper CLI, and Whisper Stream.
          - Automatic first-launch download of the required Whisper models.
          - Automatic first-launch installation or repair of the pyannote diarization runtime and model.
          - In-app update support for future releases.

          ### Download and installation

          - Download the \`.dmg\` file for the recommended macOS installation flow.
          - Open the disk image and drag **Sbobino** into the **Applications** folder.
          - If macOS warns that the app is from an unidentified developer, Control-click **Sbobino** in Applications and choose **Open**, or go to **System Settings > Privacy & Security** and click **Open Anyway**.
          - On first launch, accept the privacy terms and let the app complete the guided local runtime setup before entering the main UI.

          ### Important notes

          - This release is intended for macOS Apple Silicon.
          - This public build may be unsigned if Apple release credentials are not configured in CI, so Gatekeeper approval can be required once on first launch.
          - Apple notarization is applied only when Apple release credentials are configured in CI.
          - The DMG stays lighter because the local runtime toolchain, Whisper models, and pyannote diarization assets are installed during setup instead of being bundled inside the app.
          EOF

      - name: Generate updater feed
        run: |
          VERSION="${TAG_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SIGNATURE=$(tr -d '\n' < "dist/macos/Sbobino.app.tar.gz.sig")
          NOTES=$(cat release-notes.md)
          URL="https://github.com/pietroMastro92/Sbobino/releases/download/v${VERSION}/Sbobino.app.tar.gz"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg url "$URL" \
            --arg signature "$SIGNATURE" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  url: $url,
                  signature: $signature
                }
              }
            }' > latest.json

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          draft: false
          prerelease: false
          body_path: release-notes.md
          generate_release_notes: false
          files: |
            dist/dmg/Sbobino_*.dmg
            dist/macos/Sbobino.app.tar.gz
            dist/macos/Sbobino.app.tar.gz.sig
            dist/release-assets/setup-manifest.json
            dist/pyannote-release/*.zip
            dist/pyannote-release/*.json
            dist/runtime-release/*.zip
            dist/runtime-release/*.json
            latest.json
